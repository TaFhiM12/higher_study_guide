<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
    <!--navbar section-->
    <div>
        <div class="bg-[#aaaaaa] fixed top-0 p-4  w-[100%] text-black">
            <div class="text-stone-800 container mx-auto flex justify-between items-center">
                <div class="font-bold ml-3 text-[20px] italic">Higher Study Guide</div>
                <div class="space-x-4 px-4 sm:text-[15px] text-[10px]">
                    <a href="#" class="hover:text-white">Home</a>
                    <a href="#" class="hover:text-white">Blog</a>
                    <a href="#" class="hover:text-white">Agency</a>
                    <a href="#" class="hover:text-white">Eligibility</a>
                    <a href="#" class="hover:text-white">FAQ</a>
                    <a href="#" class="hover:text-white">Success</a>
                    <a href="#" class="hover:text-white">Log In</a>
                </div>
            </div>
        </div>
    </div>

    <!--eligibility section-->

    <div class="container mx-auto mt-20 p-4 max-w-lg bg-[#e8e3e3] shadow-lg rounded-lg">
        <h2 class="text-2xl font-bold mb-4">Eligibility Form</h2>
        <form class="space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" id="name" name="name" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label for="degree" class="block text-sm font-medium text-gray-700">Highest Degree Obtained</label>
                <select id="degree" name="degree" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
                    <option value="">Select your degree</option>
                    <option value="bachelor">Bachelor's</option>
                    <option value="master">Master's</option>
                    <option value="phd">PhD</option>
                </select>
            </div>
            <div>
                <label for="gpa" class="block text-sm font-medium text-gray-700">GPA</label>
                <input type="number" step="0.01" id="gpa" name="gpa" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label for="experience" class="block text-sm font-medium text-gray-700">Years of Experience</label>
                <input type="number" id="experience" name="experience" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" required>
            </div>
            <div>
                <label for="comments" class="block text-sm font-medium text-gray-700">Additional Comments</label>
                <textarea id="comments" name="comments" rows="4" class="mt-1 block w-full p-2 border border-gray-300 rounded-md"></textarea>
            </div>
            <div>
                <button type="submit" class="bg-blue-500 text-white p-2 rounded-md">Submit</button>
            </div>
        </form>
    </div>
    <!-- result section -->
    <div id="result" class="container mx-auto mt-10 p-4 max-w-lg bg-white shadow-lg rounded-lg hidden">
        <h2 class="text-2xl font-bold mb-4">Eligibility Result</h2>
        <p id="resultMessage" class="text-gray-700"></p>
    </div>

    <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value;
            const degree = document.getElementById('degree').value;
            const gpa = parseFloat(document.getElementById('gpa').value);
            const experience = parseInt(document.getElementById('experience').value);
            
            let message = `Thank you, ${name}. `;
            
            if (degree === 'phd' || (degree === 'master' && gpa >= 3.5 && experience >= 2) || (degree === 'bachelor' && gpa >= 3.7 && experience >= 3)) {
                message += 'You are eligible for our program.';
            } else {
                message += 'Unfortunately, you do not meet the eligibility criteria for our program.';
            }
            
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('result').classList.remove('hidden');
        });
    </script>
   </body>
</html>
