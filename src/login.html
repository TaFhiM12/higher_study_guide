<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
    <!--navbar section-->
    <div>
        <div class="bg-[#aaaaaa] fixed top-0 p-4  w-[100%] text-black">
            <div class="text-stone-800 container mx-auto flex justify-between items-center">
                <div class="font-bold ml-3 text-[20px] italic">Higher Study Guide</div>
                <div class="space-x-4 px-4 sm:text-[15px] text-[10px]">
                    <a href="#" class="hover:text-white">Home</a>
                    <a href="#" class="hover:text-white">Blog</a>
                    <a href="#" class="hover:text-white">Agency</a>
                    <a href="#" class="hover:text-white">Eligibility</a>
                    <a href="#" class="hover:text-white">FAQ</a>
                    <a href="#" class="hover:text-white">Success</a>
                    <a href="#" class="hover:text-white">Log In</a>
                </div>
            </div>
        </div>
    </div>
    
    <!--login section-->
    <div class="flex items-center justify-center min-h-screen bg-[#f0f0f0] pt-20">
        <div class="bg-[#e8e3e3] p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Log In</h2>
            <form>
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium mb-2">Email</label>
                    <input type="email" id="email" class="w-full p-2 border border-gray-300 rounded" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium mb-2">Password</label>
                    <input type="password" id="password" class="w-full p-2 border border-gray-300 rounded" required>
                </div>
                <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Log In</button>
            </form>
            <p class="mt-4 text-center">
                Don't have an account? <a href="#" class="text-blue-500 hover:underline">Register</a>
            </p>
        </div>
    </div>

   </body>
</html>
